services:
  dashboard:
    build: .
    container_name: egp-admin-dashboard
    restart: unless-stopped
    network_mode: host
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - secrets/production.env
    environment:
      NODE_ENV: production
      HOST: 127.0.0.1
      PORT: 3100
      ANALYTICS_PRODUCTION_SINCE: "2026-06-25T00:00:00Z"
      ANALYTICS_TRACKING_SINCE: "2026-07-03T11:53:00Z"
      GMAIL_HEALTH_FILE: /app/runtime/gmail-health.json
    volumes:
      - ./runtime:/app/runtime:ro
      - dashboard_auth:/app/auth-data
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  gmail-ingest:
    build: .
    container_name: egp-admin-gmail
    restart: unless-stopped
    network_mode: host
    command: ["npm", "run", "ingest:mail"]
    env_file:
      - secrets/production.env
      - secrets/gmail.env
    environment:
      GMAIL_HEALTH_FILE: /app/runtime/gmail-health.json
      MAIL_INGEST_INTERVAL_MS: 15000
      MAIL_INGEST_LOOKBACK_DAYS: 30
      MAIL_INGEST_MAX_MESSAGES_PER_CYCLE: 40
      MAIL_ORDER_WAIT_MS: 21600000
      MAIL_SENDER_COUNTRY_MAP_FILE: config/mail-senders.json
    volumes:
      - ./runtime:/app/runtime
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  editorial-worker:
    build: .
    container_name: egp-admin-editorial
    restart: unless-stopped
    network_mode: host
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["npm", "run", "editorial:worker"]
    env_file:
      - secrets/production.env
    environment:
      EDITORIAL_POLL_INTERVAL_MS: 300000
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: egp-admin-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
  dashboard_auth:

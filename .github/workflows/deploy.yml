name: Deploy dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-dashboard
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/egp_dashboard
          chmod 600 ~/.ssh/egp_dashboard
          ssh-keyscan -H 195.133.93.51 >> ~/.ssh/known_hosts

      - name: Upload application
        run: |
          rsync -rz --delete \
            --exclude='.git/' \
            --exclude='secrets/' \
            --exclude='runtime/' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            -e 'ssh -i ~/.ssh/egp_dashboard' \
            ./ egpadmin@195.133.93.51:/opt/egp-admin/app/

      - name: Rebuild and verify production
        run: ssh -i ~/.ssh/egp_dashboard egpadmin@195.133.93.51 'bash /opt/egp-admin/app/scripts/deploy-production.sh'
